<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audit Booked — AceAccred</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230F1F3D'/><rect x='6' y='20' width='20' height='3' rx='1.5' fill='%23E8892C'/><polygon points='16,7 28,13 16,19 4,13' fill='%23E8892C'/></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: #F7F5F0;
      color: #0F1F3D;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: #fff;
      padding: 56px 44px;
      border-radius: 22px;
      box-shadow: 0 16px 56px rgba(15, 31, 61, 0.09);
      max-width: 520px;
      width: 100%;
      border: 1px solid rgba(15, 31, 61, 0.06);
      animation: slideUp 0.65s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .icon {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
      animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
    }
    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: #0F1F3D;
      margin-bottom: 14px;
      line-height: 1.2;
    }
    p {
      font-size: 1rem;
      color: #4a5e7a;
      line-height: 1.68;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      font-weight: 600;
      font-size: 0.95rem;
      border-radius: 8px;
      padding: 13px 26px;
      text-decoration: none;
      transition: all 0.22s ease;
      background: linear-gradient(135deg, #E8892C, #f5a623);
      color: #fff;
      box-shadow: 0 4px 20px rgba(232, 137, 44, 0.38);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(232, 137, 44, 0.48);
    }
    .logo { height: 32px; width: auto; opacity: 0.6; margin: 32px auto 0; }
  </style>
</head>

<body>
  <div class="card">
    <span class="icon">
      <svg width="68" height="68" viewBox="0 0 68 68" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="34" cy="34" r="32" fill="rgba(29,158,117,0.1)" stroke="#1D9E75" stroke-width="2.5"/>
        <path d="M22 34l10 10 14-20" stroke="#1D9E75" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
    <h1>Audit Booked!</h1>
    <p>We've received your details. Our accreditation experts will WhatsApp you within 24 hours to confirm your free 20-minute readiness call.</p>
    <a href="/" class="btn">&larr; Back to Home</a>
    <img src="Aceacred_logo.png" alt="AceAccred" class="logo" />
  </div>
</body>

</html>
